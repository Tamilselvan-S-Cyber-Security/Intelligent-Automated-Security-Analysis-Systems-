<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .box{fill:#ffffff;stroke:#111827;stroke-width:2;rx:14;}
      .title{font:700 22px Arial, sans-serif;fill:#111827;}
      .text{font:16px Arial, sans-serif;fill:#111827;}
      .small{font:14px Arial, sans-serif;fill:#374151;}
      .arrow{stroke:#111827;stroke-width:2;fill:none;marker-end:url(#m);} 
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111827" />
    </marker>
  </defs>

  <text x="40" y="50" class="title">CyberWolfScanner - High Level Architecture</text>

  <rect x="70" y="110" width="300" height="140" class="box"/>
  <text x="95" y="150" class="text">User</text>
  <text x="95" y="178" class="small">- Inputs URL / content</text>
  <text x="95" y="204" class="small">- Selects scan type</text>

  <rect x="450" y="90" width="320" height="180" class="box"/>
  <text x="475" y="130" class="text">Presentation Layer</text>
  <text x="475" y="158" class="small">- Streamlit Dashboard (wolf.py)</text>
  <text x="475" y="184" class="small">- Flask UI / Routes (app.py)</text>
  <text x="475" y="210" class="small">- Templates / Static assets</text>

  <rect x="850" y="90" width="300" height="180" class="box"/>
  <text x="875" y="130" class="text">Orchestration Layer</text>
  <text x="875" y="158" class="small">- VulnerabilityScanner</text>
  <text x="875" y="184" class="small">- API Key Manager</text>
  <text x="875" y="210" class="small">- Scan options + summary</text>

  <rect x="160" y="340" width="420" height="260" class="box"/>
  <text x="185" y="380" class="text">Scanning / Analysis Layer</text>
  <text x="185" y="410" class="small">- modules/* scanners (XSS, SQLi, SSRF, XXE, ...)</text>
  <text x="185" y="436" class="small">- Network Scanner (DNS/WHOIS/Ping/Traceroute)</text>
  <text x="185" y="462" class="small">- Web Scraper (crawl + extract URLs/forms)</text>
  <text x="185" y="488" class="small">- AI analysis (WolfAPI + security_analyzer)</text>

  <rect x="680" y="340" width="430" height="260" class="box"/>
  <text x="705" y="380" class="text">Reporting Layer</text>
  <text x="705" y="410" class="small">- ReportGenerator (HTML + charts)</text>
  <text x="705" y="436" class="small">- utils/reporter.py (format/save)</text>
  <text x="705" y="462" class="small">- Export / Download</text>

  <path d="M370 170 L450 170" class="arrow"/>
  <path d="M770 170 L850 170" class="arrow"/>
  <path d="M1010 270 L920 340" class="arrow"/>
  <path d="M920 340 L920 320" class="arrow"/>
  <path d="M770 270 L560 340" class="arrow"/>
  <path d="M580 470 L680 470" class="arrow"/>

  <text x="392" y="160" class="small">requests</text>
  <text x="792" y="160" class="small">dispatch</text>
  <text x="845" y="312" class="small">scan jobs</text>
  <text x="595" y="312" class="small">data</text>
  <text x="610" y="458" class="small">results</text>
</svg>
