<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .box{fill:#fff;stroke:#111827;stroke-width:2;rx:12;}
      .decision{fill:#fff;stroke:#111827;stroke-width:2;}
      .t{font:700 22px Arial, sans-serif;fill:#111827;}
      .s{font:16px Arial, sans-serif;fill:#111827;}
      .small{font:14px Arial, sans-serif;fill:#374151;}
      .a{stroke:#111827;stroke-width:2;fill:none;marker-end:url(#m);} 
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111827" />
    </marker>
  </defs>

  <text x="40" y="50" class="t">CyberWolfScanner - Error Handling Flow</text>

  <rect x="90" y="110" width="300" height="70" class="box"/>
  <text x="115" y="153" class="s">Start Scan</text>

  <polygon points="240,220 340,280 240,340 140,280" class="decision"/>
  <text x="185" y="286" class="s">Valid Target?</text>

  <rect x="90" y="380" width="300" height="70" class="box"/>
  <text x="115" y="423" class="s">Show Invalid Target Error</text>

  <rect x="470" y="240" width="300" height="70" class="box"/>
  <text x="495" y="283" class="s">Start Analysis</text>

  <polygon points="620,340 720,400 620,460 520,400" class="decision"/>
  <text x="560" y="406" class="s">API Available?</text>

  <rect x="830" y="360" width="320" height="70" class="box"/>
  <text x="855" y="403" class="s">Use AI-Powered Analysis</text>

  <rect x="470" y="500" width="300" height="70" class="box"/>
  <text x="495" y="543" class="s">Fallback to Local Analysis</text>

  <polygon points="620,600 720,660 620,720 520,660" class="decision"/>
  <text x="565" y="666" class="s">Scan Complete?</text>

  <path d="M240 180 L240 220" class="a"/>
  <path d="M340 280 L470 275" class="a"/>
  <path d="M240 340 L240 380" class="a"/>
  <path d="M620 310 L620 340" class="a"/>
  <path d="M720 400 L830 395" class="a"/>
  <path d="M620 460 L620 500" class="a"/>

  <text x="360" y="262" class="small">Yes</text>
  <text x="250" y="365" class="small">No</text>
  <text x="740" y="388" class="small">Yes</text>
  <text x="640" y="492" class="small">No</text>
</svg>
